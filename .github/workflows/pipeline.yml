name: CI/CD Pipeline

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: harbor.support.tools
  IMAGE_NAME: kubetty/kubetty
  GO_VERSION: '1.24'
  NODE_VERSION: '20'

jobs:
  # Stage 1: Validation
  validate:
    name: Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: server/go.sum

      - name: Verify Go version
        run: |
          go version
          go version | grep -q "go1.24" || (echo "ERROR: Must use Go 1.24.x" && exit 1)

      - name: Check Go formatting
        working-directory: server
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "ERROR: The following files are not formatted:"
            echo "$unformatted"
            exit 1
          fi

      - name: Run go vet
        working-directory: server
        run: go vet ./...

      - name: Verify go.mod is tidy
        working-directory: server
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum || (echo "ERROR: go.mod or go.sum not tidy" && exit 1)

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Run npm audit
        working-directory: web
        run: npm audit --audit-level=high
        continue-on-error: true

  # Stage 2: Test Matrix
  test-server:
    name: Server Tests
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: server/go.sum

      - name: Run server tests
        working-directory: server
        run: |
          go test -v -race -coverprofile=coverage.out -covermode=atomic ./...

      - name: Check test coverage
        working-directory: server
        continue-on-error: true  # Coverage threshold is advisory while database tests are skipped in CI
        run: |
          coverage=$(go tool cover -func=coverage.out | grep total | awk '{print substr($3, 1, length($3)-1)}')
          echo "Test coverage: ${coverage}%"
          threshold=30
          if (( $(echo "$coverage < $threshold" | bc -l) )); then
            echo "WARNING: Coverage ${coverage}% is below threshold ${threshold}%"
            exit 1
          fi

      - name: Upload coverage to artifacts
        uses: actions/upload-artifact@v4
        with:
          name: server-coverage
          path: server/coverage.out

  test-web:
    name: Web Tests
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        working-directory: web
        run: npm ci

      - name: Run web tests
        working-directory: web
        run: npm run test

      - name: Run linter
        working-directory: web
        run: npm run build

  # Stage 3: Build Docker Image
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [test-server, test-web]
    permissions:
      contents: read
      id-token: write          # GitHub OIDC -> Vault (keyless Harbor login)
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      image-digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Keyless: mint a GitHub OIDC token and exchange it at Vault for the
      # repo-scoped Harbor robot (replaces org admin HARBOR_USERNAME/PASSWORD).
      - name: Vault login (GitHub OIDC) + Harbor robot
        if: github.event_name != 'pull_request'
        uses: hashicorp/vault-action@v3
        with:
          url: https://vault.support.tools
          method: jwt
          path: github-actions
          role: gha-kubetty
          jwtGithubAudience: https://github.com/SupportTools
          exportEnv: true
          secrets: |
            secret/data/harbor/kubetty-ci-robot username | HARBOR_ROBOT_USER ;
            secret/data/harbor/kubetty-ci-robot password | HARBOR_ROBOT_TOKEN

      - name: Log in to Harbor
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ env.HARBOR_ROBOT_USER }}
          password: ${{ env.HARBOR_ROBOT_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            GO_VERSION=1.24.3
            NODE_MAJOR=20

  # Stage 4: Security Scanning (disabled - image too large for CI timeout)
  # Migrated from a per-repo Trivy job to Grype for consistency across repos, but kept
  # opt-in/disabled: `if: false` mirrors the previous Trivy job's disabled state (KubeTTY's
  # image is too large for Grype to scan in CI). Uses anchore/scan-action (grype engine)
  # IN-LINE rather than the org reusable grype-scan.yml: pipeline.yml is pull_request-
  # triggered, and a private-repo reusable `uses:` fails to resolve at workflow-LOAD time
  # on pull_request, failing the ENTIRE run at startup (0 jobs) even with `if: false`, since
  # resolution happens before `if` is evaluated. An in-line action has no such problem.
  grype-scan:
    name: Security Scan (Grype)
    runs-on: ubuntu-latest
    needs: [build]
    if: false  # Disabled - KubeTTY image too large for Grype to scan in CI (same reasoning as the prior Trivy job)
    permissions:
      contents: read
      security-events: write
    steps:
      # NOTE: if ever enabled, this needs a Harbor login step (image is a private
      # harbor.support.tools ref); left out while the job is disabled.
      - name: Grype scan (anchore/scan-action, informational)
        uses: anchore/scan-action@v6
        with:
          image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ needs.build.outputs.image-digest }}
          fail-build: false
          severity-cutoff: high

  # Stage 5: Helm Chart Validation
  helm-validate:
    name: Helm Chart Validation
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: 'v3.15.2'

      - name: Lint Helm charts
        run: |
          # Gateway chart - default values
          helm lint deploy/helm-gateway/
          # Gateway chart - production values
          helm lint deploy/helm-gateway/ -f deploy/helm-gateway/values.prd.yaml
          # Project chart - requires projectId and sessionID
          helm lint deploy/helm-project/ \
            --set projectId=lint-test \
            --set env.sessionID=00000000-0000-0000-0000-000000000001

      - name: Validate Helm templates
        run: |
          helm template gateway deploy/helm-gateway/ > /dev/null
          helm template gateway deploy/helm-gateway/ -f deploy/helm-gateway/values.prd.yaml > /dev/null
          helm template project deploy/helm-project/ \
            --set projectId=template-test \
            --set env.sessionID=00000000-0000-0000-0000-000000000001 > /dev/null

      - name: Package Helm charts
        if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
        run: |
          helm package deploy/helm-gateway/ --destination ./helm-packages
          helm package deploy/helm-project/ --destination ./helm-packages

      - name: Upload Helm charts as artifact
        if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: helm-charts
          path: helm-packages/*.tgz

  # Stage 6: Deploy to Production
  deploy-production:
    name: Deploy to Production
    runs-on: self-hosted-linux
    needs: [build, helm-validate]
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      id-token: write          # GitHub OIDC -> Vault (keyless, namespace-scoped K8s token)
    concurrency:
      group: deploy-production
      cancel-in-progress: false
    environment:
      name: production
      url: https://kubetty.support.tools
    steps:
      - name: Validate semantic version tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG="${GITHUB_REF_NAME}"
          if ! [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "ERROR: Production tag must be clean semantic version (v1.2.3)"
            echo "Got: $TAG"
            echo ""
            echo "CLAUDE.md rule: Semantic versioning only - No suffixes like -rc, -beta, -alpha"
            exit 1
          fi
          echo "✓ Valid semantic version: $TAG"

      - name: Verify security scan passed
        if: false  # Disabled - Grype scan is opt-in/skipped (image too large for CI)
        run: |
          if [ "${{ needs.grype-scan.result }}" != "success" ]; then
            echo "ERROR: Security scan did not pass"
            echo "Security scan result: ${{ needs.grype-scan.result }}"
            echo "Cannot deploy to production with security issues"
            exit 1
          fi
          echo "✓ Security scan passed"

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'v1.30.3'

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: 'v3.15.2'

      # Keyless: exchange the GitHub OIDC token at Vault; exportToken makes
      # VAULT_TOKEN available so the next step can mint a short-lived,
      # namespace-scoped Kubernetes token (replaces org admin KUBECONFIG_PROD).
      - name: Vault login (GitHub OIDC)
        uses: hashicorp/vault-action@v3
        with:
          url: https://vault.support.tools
          method: jwt
          path: github-actions
          role: gha-kubetty
          jwtGithubAudience: https://github.com/SupportTools
          exportToken: true

      - name: Mint short-lived Kubernetes deploy token
        env:
          VAULT_ADDR: https://vault.support.tools
        run: |
          KUBE_TOKEN=$(curl -sf -H "X-Vault-Token: ${VAULT_TOKEN}" \
            -X PUT -d '{"kubernetes_namespace":"arc-runners-supporttools"}' \
            "${VAULT_ADDR}/v1/kubernetes-onprem/creds/kubetty" \
            | jq -r '.data.service_account_token')
          test -n "$KUBE_TOKEN" && test "$KUBE_TOKEN" != null || { echo "::error::failed to mint K8s token"; exit 1; }
          echo "::add-mask::$KUBE_TOKEN"
          # Build the kubeconfig at the same path the deploy steps already use.
          # In-cluster runner => talk to a1-ops-prd's own apiserver + in-cluster CA.
          mkdir -p "$HOME/.kube"
          kubectl config set-cluster onprem \
            --server=https://kubernetes.default.svc:443 \
            --certificate-authority=/var/run/secrets/kubernetes.io/serviceaccount/ca.crt \
            --embed-certs=true
          kubectl config set-credentials kubetty-ci --token="${KUBE_TOKEN}"
          kubectl config set-context ci --cluster=onprem --user=kubetty-ci --namespace=kubetty-gateway-prd
          kubectl config use-context ci

      - name: Extract image tag
        id: extract-tag
        run: |
          # Use tag version if this is a tag push, otherwise use 'latest'
          # For semver tags (v0.6.0), docker/metadata-action creates tag without 'v' prefix (0.6.0)
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
            # Strip 'v' prefix to match docker/metadata-action semver pattern
            TAG="${TAG#v}"
          else
            TAG="latest"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Deploying version: ${TAG}"

      - name: Deploy to production
        id: deploy
        run: |
          # Capture current revision for potential rollback
          CURRENT_REVISION=$(helm history kubetty-gateway -n kubetty-gateway-prd --max 1 -o json 2>/dev/null | jq -r '.[0].revision // "0"') || CURRENT_REVISION="0"
          echo "current-revision=${CURRENT_REVISION}" >> "$GITHUB_OUTPUT"
          echo "Deploying version: ${{ steps.extract-tag.outputs.tag }}"
          echo "Current revision: ${CURRENT_REVISION}"

          helm upgrade --install kubetty-gateway deploy/helm-gateway/ \
            -n kubetty-gateway-prd \
            -f deploy/helm-gateway/values.prd.yaml \
            --set image.repository=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }} \
            --set image.tag=${{ steps.extract-tag.outputs.tag }} \
            --wait \
            --timeout=5m \
            --history-max=20 \
            --atomic

      - name: Verify deployment
        run: |
          kubectl wait --for=condition=ready pod \
            -l app.kubernetes.io/name=kubetty-gateway \
            -n kubetty-gateway-prd \
            --timeout=300s

          # Check pod health
          READY_PODS=$(kubectl get pods -n kubetty-gateway-prd -l app.kubernetes.io/name=kubetty-gateway -o json | jq '[.items[] | select(.status.phase == "Running")] | length')
          if [ "$READY_PODS" -eq 0 ]; then
            echo "ERROR: No pods are running after deployment"
            exit 1
          fi
          echo "✓ ${READY_PODS} pod(s) running successfully in production"

      - name: Run smoke tests
        run: |
          echo "=== Pod Status ==="
          kubectl get pods -n kubetty-gateway-prd -l app.kubernetes.io/name=kubetty-gateway

          echo ""
          echo "=== Service Endpoints ==="
          kubectl get svc -n kubetty-gateway-prd

          echo ""
          echo "=== Deployment Status ==="
          kubectl rollout status deployment/gateway -n kubetty-gateway-prd --timeout=60s

      - name: Rollback on failure
        if: failure() && steps.deploy.outputs.current-revision != '0'
        run: |
          echo "❌ PRODUCTION DEPLOYMENT FAILED ❌"
          echo "Attempting automatic rollback to revision ${{ steps.deploy.outputs.current-revision }}..."

          helm rollback kubetty-gateway ${{ steps.deploy.outputs.current-revision }} -n kubetty-gateway-prd --wait

          # Verify rollback succeeded
          kubectl wait --for=condition=ready pod \
            -l app.kubernetes.io/name=kubetty-gateway \
            -n kubetty-gateway-prd \
            --timeout=180s || echo "⚠️  WARNING: Rollback verification failed - manual intervention required"

          echo "Rollback completed. Please investigate the failure before attempting another deployment."

      - name: Collect failure logs
        if: failure()
        run: |
          echo "=== Failed Pod Logs ==="
          for pod in $(kubectl get pods -n kubetty-gateway-prd -l app.kubernetes.io/name=kubetty-gateway -o name | head -5); do
            echo "Logs from ${pod}:"
            kubectl logs ${pod} -n kubetty-gateway-prd --tail=100 || echo "Could not retrieve logs for ${pod}"
            echo "---"
          done

          echo ""
          echo "=== Recent Events ==="
          kubectl get events -n kubetty-gateway-prd --sort-by='.lastTimestamp' | tail -30
