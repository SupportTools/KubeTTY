{{- if .Values.rbac.create }}
{{- $fullName := include "kubetty-project.fullname" . }}
{{- $saName := include "kubetty-project.serviceAccountName" . }}
{{- $labels := include "kubetty-project.labels" . }}

{{/* Admin access to specified namespaces */}}
{{- range .Values.rbac.adminNamespaces }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ $fullName }}-admin
  namespace: {{ . }}
  labels:
    {{- $labels | nindent 4 }}
rules:
  - apiGroups: ["", "apps", "batch", "extensions", "networking.k8s.io"]
    resources: ["*"]
    verbs: ["*"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ $fullName }}-admin
  namespace: {{ . }}
  labels:
    {{- $labels | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ $fullName }}-admin
subjects:
  - kind: ServiceAccount
    name: {{ $saName }}
    namespace: {{ $.Release.Namespace }}
{{- end }}

{{/* Read-only access to specified namespaces */}}
{{- range .Values.rbac.readNamespaces }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ $fullName }}-read
  namespace: {{ . }}
  labels:
    {{- $labels | nindent 4 }}
rules:
  - apiGroups: ["", "apps", "batch", "extensions", "networking.k8s.io"]
    resources: ["*"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ $fullName }}-read
  namespace: {{ . }}
  labels:
    {{- $labels | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ $fullName }}-read
subjects:
  - kind: ServiceAccount
    name: {{ $saName }}
    namespace: {{ $.Release.Namespace }}
{{- end }}
{{- end }}
