{{- if .Values.rbac.create }}
{{- $sa := include "kubetty.serviceAccountName" . -}}
{{- $suffix := .Values.rbac.clusterResourceSuffix | default "" -}}
{{- $adminNS := .Values.rbac.projectNamespaces | default .Values.rbac.adminNamespaces -}}
{{- range $ns := $adminNS }}
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "kubetty.fullname" $ }}-admin
  namespace: {{ $ns }}
subjects:
  - kind: ServiceAccount
    name: {{ $sa }}
    namespace: {{ $.Release.Namespace }}
roleRef:
  kind: ClusterRole
  name: {{ include "kubetty.fullname" $ }}-admin{{ $suffix }}
  apiGroup: rbac.authorization.k8s.io
---
{{- end }}
{{- range $ns := .Values.rbac.readNamespaces }}
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "kubetty.fullname" $ }}-read
  namespace: {{ $ns }}
subjects:
  - kind: ServiceAccount
    name: {{ $sa }}
    namespace: {{ $.Release.Namespace }}
roleRef:
  kind: ClusterRole
  name: {{ include "kubetty.fullname" $ }}-read{{ $suffix }}
  apiGroup: rbac.authorization.k8s.io
---
{{- end }}
{{- end }}
