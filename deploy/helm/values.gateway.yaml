image:
  repository: harbor.support.tools/kubetty/kubetty
  tag: v0.5.1
  pullPolicy: IfNotPresent

imagePullSecrets:
  - harbor-supporttools

namespace: kubetty-shared
releaseName: kubetty-shared-gateway

deploymentId: kubetty-gateway

env:
  sessionID: "11111111-2222-3333-4444-555555555555"
  kubettyMode: "gateway"
  claudeMaxTokens: "64000"
  anthropicBaseURL: "http://172.25.1.66:8080"
  nodeOptions: "--max-old-space-size=32768"
  claudeConfigDir: "/home/mmattox/.claude"
  extra: {}
auth:
  mode: local
  jwtSecret: ""
  jwtSecretSecret:
    name: kubetty-gateway-auth
    key: jwt-secret
  issuer: kubetty
  accessTTL: 15m
  refreshTTL: 720h
  cookieDomain: kubetty.support.tools
  cookieSecure: true

gateway:
  enabled: true
  catalog:
    inline: |
      projects:
        - id: beacon
          displayName: "Beacon Support"
          namespace: kubetty-beacon-support
          service: kubetty-beacon-support-kubetty
          port: 8080
          # Optional: enforce per-user tab limits (0 = unlimited, default)
          # limits:
          #   maxTabsPerClient: 1   # Recommended: single shell per user per project
          #   maxTabsTotal: 10      # Total concurrent shells for this project
        # Add other project pods here
    mountPath: /etc/kubetty
    fileName: projects.yaml

cnpg:
  host: 172.28.58.5
  port: 5432
  database: kubetty
  userSecret: kubetty-postgres-user
  usernameKey: username
  passwordKey: password

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: true
  className: nginx
  tlsSecret: star-support-tools-tls
  hosts:
    - host: kubetty.support.tools
      path: /
  annotations:
    nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "60"
pipelines:
  dind:
    enabled: false
