apiVersion: v1
kind: Service
metadata:
  name: project
  labels:
    {{- include "kubetty-project.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "kubetty-project.selectorLabels" . | nindent 4 }}
