apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "kubetty.fullname" . }}
  labels:
    app.kubernetes.io/name: {{ include "kubetty.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/version: {{ .Chart.AppVersion }}
    app.kubernetes.io/managed-by: Helm
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "kubetty.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "kubetty.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
      {{- $scrape := .Values.prometheus.scrape | default dict }}
      {{- if or .Values.podAnnotations $scrape.enabled }}
      annotations:
        {{- range $k, $v := .Values.podAnnotations }}
        {{ $k }}: {{ $v | quote }}
        {{- end }}
        {{- if $scrape.enabled }}
        prometheus.io/scrape: "true"
        prometheus.io/path: {{ default "/metrics" $scrape.path | quote }}
        {{- $scrapePort := printf "%v" (default .Values.service.port $scrape.port) }}
        prometheus.io/port: {{ $scrapePort | quote }}
        {{- if $scrape.scheme }}
        prometheus.io/scheme: {{ $scrape.scheme | quote }}
        {{- end }}
        {{- range $k, $v := $scrape.annotations }}
        {{ $k }}: {{ $v | quote }}
        {{- end }}
        {{- end }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "kubetty.serviceAccountName" . }}
      securityContext:
        supplementalGroups:
          - 0
      {{- if .Values.imagePullSecrets }}
      imagePullSecrets:
{{- range .Values.imagePullSecrets }}
        - name: {{ . }}
{{- end }}
      {{- end }}
      {{- if .Values.dataPVC.enabled }}
      initContainers:
        - name: init-permissions
          image: ubuntu:22.04
          command:
            - /bin/bash
            - -c
            - |
              set -euo pipefail
              if ! getent group mmattox >/dev/null; then
                groupadd -g 1000 mmattox
              fi
              if ! id -u mmattox >/dev/null 2>&1; then
                useradd -u 1000 -g mmattox -M -s /usr/sbin/nologin mmattox
              fi
{{- if .Values.dataPVC.subPaths }}
{{- range $mount := .Values.dataPVC.subPaths }}
{{- $subPathName := default (regexReplaceAll "[^A-Za-z0-9-]+" (default "root" (trimPrefix "/" $mount.path)) "-") $mount.subPath }}
{{- $mountPath := default "/" $mount.path }}
              mkdir -p /data/{{ $subPathName }}
{{- if hasPrefix "/home" $mountPath }}
              mkdir -p /data/{{ $subPathName }}/mmattox
{{- end }}
              chown -R mmattox:mmattox /data/{{ $subPathName }}
{{- end }}
{{- end }}
          securityContext:
            runAsUser: 0
          volumeMounts:
            - name: data
              mountPath: /data
      {{- end }}
      containers:
{{- if .Values.pipelines.dind.enabled }}
        - name: docker
          image: docker:24.0.5-dind
          securityContext:
            privileged: true
          env:
            - name: DOCKER_TLS_CERTDIR
              value: ""
          args:
            - --host=unix:///var/run/docker/docker.sock
            - --host=tcp://0.0.0.0:2375
          volumeMounts:
            - name: dind-storage
              mountPath: /var/lib/docker
            - name: dind-sock
              mountPath: /var/run/docker
{{- end }}
        - name: kubetty
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
{{- $gatewayEnabled := .Values.gateway.enabled | default false }}
{{- $catalogMountPath := default "/etc/kubetty" .Values.gateway.catalog.mountPath }}
{{- $catalogFile := default "projects.yaml" .Values.gateway.catalog.fileName }}
{{- $catalogFullPath := printf "%s/%s" $catalogMountPath $catalogFile }}
          env:
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: DEPLOYMENT_ID
              value: {{ .Values.deploymentId | quote }}
            - name: SESSION_ID
              value: {{ .Values.env.sessionID | quote }}
            - name: CLAUDE_CODE_MAX_OUTPUT_TOKENS
              value: {{ .Values.env.claudeMaxTokens | quote }}
            - name: ANTHROPIC_BASE_URL
              value: {{ .Values.env.anthropicBaseURL | quote }}
            - name: NODE_OPTIONS
              value: {{ .Values.env.nodeOptions | quote }}
            - name: CLAUDE_CONFIG_DIR
              value: {{ .Values.env.claudeConfigDir | quote }}
{{- if and $gatewayEnabled (or .Values.gateway.catalog.inline .Values.gateway.catalog.existingConfigMap) }}
            - name: PROJECT_CATALOG_PATH
              value: {{ $catalogFullPath | quote }}
{{- end }}
            - name: CNPG_HOST
              value: {{ .Values.cnpg.host | quote }}
            - name: CNPG_PORT
              value: {{ .Values.cnpg.port | quote }}
            - name: CNPG_DATABASE
              value: {{ .Values.cnpg.database | quote }}
            - name: CNPG_USER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.cnpg.userSecret }}
                  key: {{ .Values.cnpg.usernameKey | default "username" }}
            - name: CNPG_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.cnpg.userSecret }}
                  key: {{ .Values.cnpg.passwordKey }}
{{- if .Values.pipelines.dind.enabled }}
            - name: DOCKER_HOST
              value: unix:///var/run/docker/docker.sock
{{- end }}
          envFrom:
            - secretRef:
                name: env-secrets
                optional: true
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
          volumeMounts:
{{- if .Values.pipelines.dind.enabled }}
            - name: dind-sock
              mountPath: /var/run/docker
{{- end }}
{{- if and $gatewayEnabled (or .Values.gateway.catalog.inline .Values.gateway.catalog.existingConfigMap) }}
            - name: gateway-catalog
              mountPath: {{ $catalogMountPath }}
              readOnly: true
{{- end }}
{{- if and .Values.dataPVC.enabled .Values.dataPVC.subPaths }}
{{- range $mount := .Values.dataPVC.subPaths }}
{{- $subPathName := default (regexReplaceAll "[^A-Za-z0-9-]+" (default "root" (trimPrefix "/" $mount.path)) "-") $mount.subPath }}
            - name: data
              mountPath: {{ $mount.path }}
              subPath: {{ $subPathName }}
{{- end }}
{{- end }}
          resources: {{- toYaml .Values.resources | nindent 12 }}
      volumes:
      {{- if .Values.dataPVC.enabled }}
        - name: data
          persistentVolumeClaim:
            claimName: {{ if .Values.dataPVC.create }}{{ default (printf "%s-data" (include "kubetty.fullname" .)) .Values.dataPVC.name }}{{ else }}{{ .Values.dataPVC.existingClaim | quote }}{{ end }}
      {{- end }}
      {{- if .Values.pipelines.dind.enabled }}
        - name: dind-storage
          emptyDir: {}
        - name: dind-sock
          emptyDir: {}
      {{- end }}
{{- if and $gatewayEnabled (or .Values.gateway.catalog.inline .Values.gateway.catalog.existingConfigMap) }}
        - name: gateway-catalog
          configMap:
            name: {{ if .Values.gateway.catalog.existingConfigMap }}{{ .Values.gateway.catalog.existingConfigMap }}{{ else }}{{ include "kubetty.fullname" . }}-catalog{{ end }}
{{- end }}
