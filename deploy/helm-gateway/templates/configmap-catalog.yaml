{{- if and .Values.catalog.inline (not .Values.catalog.existingConfigMap) }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "kubetty-gateway.fullname" . }}-catalog
  labels:
    {{- include "kubetty-gateway.labels" . | nindent 4 }}
data:
  {{ .Values.catalog.fileName }}: |
    {{- .Values.catalog.inline | nindent 4 }}
{{- end }}
