# KubeTTY Project Values - beacon-support
# Deploy with: helm upgrade --install beacon-support ../helm-project -n kubetty-beacon-support -f beacon-support.yaml

image:
  repository: harbor.support.tools/kubetty/kubetty
  tag: "0.6.6"
  pullPolicy: IfNotPresent

imagePullSecrets:
  - harbor-supporttools

# Project identifier - matches gateway catalog entry
projectId: beacon-support

env:
  # Session UUID - DO NOT CHANGE after initial deployment
  sessionID: "302ed84c-08b9-4445-ad92-c9899e7abea6"

  # User identity
  kubettyUser: "mmattox"

  # Claude Code configuration
  claudeMaxTokens: "64000"
  anthropicBaseURL: "http://172.25.1.66:8080"
  nodeOptions: "--max-old-space-size=32768"
  claudeConfigDir: "/home/mmattox/.claude"

  extra: {}

service:
  type: ClusterIP
  port: 8080

# Create new PVC (will migrate data from old PVC)
dataPVC:
  enabled: true
  create: true
  name: "project-data"
  storageClass: freenas-iscsi-csi
  accessModes:
    - ReadWriteOnce
  size: 50Gi
  subPaths:
    - path: /opt
      subPath: opt
    - path: /home
      subPath: home
    - path: /usr/local/go
      subPath: usr-local-go
    - path: /var/lib/docker
      subPath: var-lib-docker

serviceAccount:
  create: true
  name: ""

rbac:
  create: true
  adminNamespaces:
    - kubetty-beacon-support
    - beacon-dev
    - beacon-stg
  readNamespaces:
    - beacon-prod

resources:
  requests:
    memory: "2Gi"
    cpu: "500m"
  limits:
    memory: "8Gi"
    cpu: "4000m"

pipelines:
  dind:
    enabled: true

podAnnotations: {}

prometheus:
  scrape:
    enabled: true
    path: /metrics
    port: 8080
