# KubeTTY Project: Project B
# Production configuration for project-b pod

# Container image configuration
image:
  repository: harbor.support.tools/kubetty/kubetty
  tag: "0.6.1"
  pullPolicy: IfNotPresent

# Image pull secrets for private registries
imagePullSecrets:
  - harbor-supporttools

# Deployment configuration
namespace: kubetty-project-b
releaseName: kubetty-project-b
deploymentId: project-b

# Environment variables
env:
  # Stable session UUID for this project (DO NOT CHANGE)
  sessionID: "9b31d3f2-db1f-4e05-a300-0b04ffe2e589"

  # Operating mode: project (accessed via gateway)
  kubettyMode: "project"

  # Claude Code configuration
  claudeMaxTokens: "64000"

  # Anthropic API base URL override
  # Empty = use default Anthropic API (https://api.anthropic.com)
  anthropicBaseURL: ""

  # Node.js runtime options
  nodeOptions: "--max-old-space-size=32768"

  # Claude Code configuration directory
  claudeConfigDir: "/home/mmattox/.claude"

  # Additional environment variables
  extra:
    CLAUDE_EXTRA_FLAG: "1"

# Authentication configuration
# Project pods are accessed via gateway - auth is handled there
auth:
  mode: disabled

# CloudNativePG database configuration
# NOT REQUIRED: Project mode is stateless PTY - no database dependency
cnpg:
  host: ""
  port: 5432
  database: ""
  userSecret: ""
  usernameKey: ""
  passwordKey: ""

# Kubernetes Service
service:
  type: ClusterIP
  port: 8080

# Persistent Volume Claim for data storage
dataPVC:
  enabled: true
  create: true
  storageClass: longhorn
  accessModes:
    - ReadWriteOnce
  size: 50Gi
  subPaths:
    - path: /opt
      subPath: opt
    - path: /home
      subPath: home
    - path: /usr/local/go
      subPath: usr-local-go
    - path: /var/lib/docker
      subPath: var-lib-docker

# Docker-in-Docker support
pipelines:
  dind:
    enabled: true
