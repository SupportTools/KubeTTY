image:
  repository: harbor.support.tools/kubetty/beacon-support
  tag: v0.1.23

imagePullSecrets:
  - harbor-supporttools

namespace: kubetty-beacon-support
releaseName: kubetty-beacon-support

deploymentId: beacon-support

env:
  sessionID: "302ed84c-08b9-4445-ad92-c9899e7abea6"
  claudeMaxTokens: "64000"
  anthropicBaseURL: "http://172.25.1.66:8080"
  nodeOptions: "--max-old-space-size=32768"
  claudeConfigDir: "/home/mmattox/.claude"
  extra: {}

cnpg:
  host: 172.28.58.5
  port: 5432
  database: kubetty
  userSecret: kubetty-shared-app
  usernameKey: username
  passwordKey: password

service:
  type: ClusterIP
  port: 8080

homePVC:
  enabled: true
  create: true
  existingClaim: ""
  name: mmattox-home
  storageClass: longhorn
  accessModes:
    - ReadWriteOnce
  size: 100Gi

serviceAccount:
  create: true
  name: ""

rbac:
  create: true
  adminNamespaces:
    - kubetty-beacon-support
    - beacon-dev
    - beacon-stg
  readNamespaces:
    - beacon-prod

ingress:
  enabled: true
  className: nginx
  tlsSecret: star-support-tools-tls
  hosts:
    - host: beacon-kubetty.support.tools
      path: /
  annotations:
    nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
