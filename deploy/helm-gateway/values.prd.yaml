# KubeTTY Gateway - Production Environment
# Deploy to kubetty-gateway-prd namespace
# This file contains production-specific overrides to values.yaml
#
# Deployment:
#   helm upgrade --install kubetty-gateway ./deploy/helm-gateway \
#     -n kubetty-gateway-prd --create-namespace \
#     -f deploy/helm-gateway/values.prd.yaml

# Use stable tag for production
image:
  repository: harbor.support.tools/kubetty/kubetty
  tag: "v1.1.6"
  pullPolicy: IfNotPresent

imagePullSecrets:
  - harbor-supporttools

deploymentId: kubetty-gateway

# Production environment
env:
  LOG_LEVEL: info
  RECOMMENDED_IMAGE_TAG: "v1.1.6"

# Empty static catalog - production uses dynamic projects only
catalog:
  inline: |
    projects: []

# Authentication - enabled for production
auth:
  mode: local
  jwtSecretSecret:
    name: "kubetty-gateway-auth"
    key: jwt-secret
  issuer: kubetty
  accessTTL: 15m
  refreshTTL: 720h   # 30 days
  cookieDomain: ""
  cookieSecure: true

# Database - local CNPG cluster in same namespace
cnpg:
  host: kubetty-db-rw.kubetty-gateway-prd.svc
  port: 5432
  database: kubetty
  userSecret: kubetty-postgres-user
  usernameKey: username
  passwordKey: password

service:
  type: ClusterIP
  port: 8080

# Production ingress
ingress:
  enabled: true
  className: nginx
  tlsSecret: star-support-tools-tls
  hosts:
    - host: kubetty.support.tools
      path: /
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "60"

serviceAccount:
  create: true
  name: ""

rbac:
  create: true
  projectNamespaces:
    - kubetty-projects-prd
  # No suffix for production (owns the cluster-scoped resources)
  clusterResourceSuffix: ""

# Project controller for production
controller:
  enabled: true
  # Target namespace for dynamically managed projects (single-namespace mode)
  projectsNamespace: "kubetty-projects-prd"
  # Prefix for all Kubernetes resources created by controller
  resourcePrefix: "kubetty-project-"
  reconcileInterval: 30s
  healthCheckInterval: 60s
  envSecretName: env-secrets
  imagePullSecrets: "harbor-supporttools"

# Production resources
resources:
  requests:
    memory: "256Mi"
    cpu: "100m"
  limits:
    memory: "512Mi"
    cpu: "500m"

podAnnotations: {}

prometheus:
  scrape:
    enabled: true
    path: /metrics
    port: 8080
  podMonitor:
    enabled: false
