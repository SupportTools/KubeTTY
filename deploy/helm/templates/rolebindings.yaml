{{- if .Values.rbac.create }}
{{- $sa := include "kubetty.serviceAccountName" . -}}
{{- range $ns := .Values.rbac.adminNamespaces }}
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "kubetty.fullname" $ }}-admin
  namespace: {{ $ns }}
subjects:
  - kind: ServiceAccount
    name: {{ $sa }}
    namespace: {{ $.Release.Namespace }}
roleRef:
  kind: ClusterRole
  name: {{ include "kubetty.fullname" $ }}-admin
  apiGroup: rbac.authorization.k8s.io
---
{{- end }}
{{- range $ns := .Values.rbac.readNamespaces }}
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "kubetty.fullname" $ }}-read
  namespace: {{ $ns }}
subjects:
  - kind: ServiceAccount
    name: {{ $sa }}
    namespace: {{ $.Release.Namespace }}
roleRef:
  kind: ClusterRole
  name: {{ include "kubetty.fullname" $ }}-read
  apiGroup: rbac.authorization.k8s.io
---
{{- end }}
{{- end }}
