{{- if .Values.prometheus.podMonitor.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: {{ include "kubetty.fullname" . }}
  labels:
    app.kubernetes.io/name: {{ include "kubetty.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    {{- range $k, $v := .Values.prometheus.podMonitor.labels }}
    {{ $k }}: {{ $v | quote }}
    {{- end }}
  {{- if .Values.prometheus.podMonitor.annotations }}
  annotations:
    {{- range $k, $v := .Values.prometheus.podMonitor.annotations }}
    {{ $k }}: {{ $v | quote }}
    {{- end }}
  {{- end }}
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "kubetty.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
  podMetricsEndpoints:
    - port: {{ default "http" .Values.prometheus.podMonitor.portName | quote }}
      {{- if .Values.prometheus.podMonitor.scheme }}
      scheme: {{ .Values.prometheus.podMonitor.scheme | quote }}
      {{- end }}
      {{- if .Values.prometheus.podMonitor.path }}
      path: {{ .Values.prometheus.podMonitor.path | quote }}
      {{- end }}
      {{- if .Values.prometheus.podMonitor.interval }}
      interval: {{ .Values.prometheus.podMonitor.interval | quote }}
      {{- end }}
      {{- if .Values.prometheus.podMonitor.scrapeTimeout }}
      scrapeTimeout: {{ .Values.prometheus.podMonitor.scrapeTimeout | quote }}
      {{- end }}
{{- end }}
